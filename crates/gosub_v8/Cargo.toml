[package]
name = "gosub_v8"
version = "0.1.2"
edition = "2021"
authors = ["Gosub Community <info@gosub.io>"]
license = "MIT"
description = "V8 bindings for Gosub"

[dependencies]
log = { workspace = true }
gosub_shared = { version = "0.1.1", registry = "gosub", path = "../gosub_shared" }
gosub_webexecutor = { version = "0.1.1", registry = "gosub", path = "../gosub_webexecutor" }
thiserror = { workspace = true }
# TODO: v8 transitively pulls in adler via miniz_oxide (RUSTSEC-2025-0056, unmaintained).
# Update this dependency once a new v8 release resolves it, then remove the advisory from audit.toml.
v8 = "136.0.0"
anyhow = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
gosub_webinterop = { version = "0.1.1", registry = "gosub", path = "../gosub_webinterop" }
# Mirrors the workspace lints, except unsafe_code: this is an FFI binding crate
# around the V8 C++ API, where unsafe is inherent to nearly every operation.
[lints.rust]
unsafe_code = "allow"

[lints.clippy]
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
