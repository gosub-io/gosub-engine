[package]
name = "gosub_net"
version = "0.1.1"
edition = "2021"
authors = ["Gosub Community <info@gosub.io>"]
license = "MIT"
description = "Network utitilies"

[dependencies]
gosub_shared = { version = "0.1.1", registry = "gosub", path = "../gosub_shared", features = [] }
gosub_config = { version = "0.1.1", registry = "gosub", path = "../gosub_config", features = [] }
gosub_engine = { version = "0.1.0", path = "../gosub_engine" }
anyhow = "1.0.102"
url = "2.5.8"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1.45.0", features = ["rt"] }
reqwest = { version = "0.12.22", features = ["rustls-tls", "stream"] }


[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = "0.4.64"
js-sys = "0.3.91"
web-sys = { version = "0.3.91", features = ["Request", "RequestInit", "RequestMode", "Response", "Window"] }
