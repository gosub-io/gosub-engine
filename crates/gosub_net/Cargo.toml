[package]
name = "gosub_net"
version = "0.1.1"
edition = "2021"
authors = ["Gosub Community <info@gosub.io>"]
license = "MIT"
description = "Network utilities"

[dependencies]
gosub_config = { version = "0.1.1", registry = "gosub", path = "../gosub_config", features = [] }
gosub_interface = { version = "0.1.2", path = "../gosub_interface" }
derive_more = { version = "2", features = ["from", "display"] }
anyhow = "1.0.98"
log = "0.4.27"
domain-lookup-tree = "0.1"
cookie = { version = "0.18.1", features = ["secure", "private"] }
url = "2.5.4"
bytes = "1.10.1"
futures-util = "0.3.31"
futures-core = "0.3.31"
futures = { version = "0.3", features = ["executor"] }
http = "1.3.1"
mime = "0.3.17"
mimetype-detector = "0.2.2"
tempfile = "3.21.0"
tracing = "0.1.41"
uuid = { version = "1", features = ["v4", "serde"] }
serde = { version = "1", features = ["derive"] }
chrono = "0.4.42"
thiserror = "2.0.11"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
hickory-resolver = "0.24.4"
reqwest = { version = "0.12", features = ["gzip", "brotli", "deflate", "rustls-tls", "stream"] }
tokio = { version = "1", features = ["rt", "sync", "time", "macros"] }
tokio-util = { version = "0.7", features = ["io", "compat"] }
tokio-stream = { version = "0.1", features = ["sync"] }
dashmap = "6"

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3.72", features = ["Headers", "Request", "RequestInit", "RequestMode", "Response", "Window"] }
js-sys = "0.3.70"
wasm-bindgen-futures = "0.4.47"
