[package]
name = "gosub_net"
version = "0.1.1"
edition = "2021"
authors = ["Gosub Community <info@gosub.io>"]
license = "MIT"
description = "Network utitilies"

[dependencies]
gosub_config = { version = "0.1.1", registry = "gosub", path = "../gosub_config", features = [] }
gosub_interface = { version = "0.1.2", path = "../gosub_interface" }
derive_more = { version = "2", features = ["from", "display"] }
thiserror = "2.0.18"
anyhow = "1.0.102"
log = "0.4.29"
domain-lookup-tree = "0.1.1"
cookie = { version = "0.18.1", features = ["secure", "private"] }
url = "2.5.8"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
hickory-resolver = "0.25.2"
tokio = { version = "1.45.0", features = ["rt"] }
ureq = "3.0.11"


[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = "0.4.64"
js-sys = "0.3.91"
web-sys = { version = "0.3.91", features = ["Headers", "Request", "RequestInit", "RequestMode", "Response", "Window"] }
