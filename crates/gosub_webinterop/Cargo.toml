[package]
name = "gosub_webinterop"
version = "0.1.1"
edition = "2021"
authors = ["Gosub Community <info@gosub.io>"]
license = "MIT"
description = "Web Interop for Gosub"

[dependencies]
parking_lot = { workspace = true }
proc-macro2 = "1.0.106"
quote = { version = "1.0.45", features = [] }
syn = { version = "2.0.117", features = ["full", "extra-traits"] }
lazy_static = { workspace = true }
cow-utils = { workspace = true }


[lib]
proc-macro = true

# Proc-macro crate: panicking IS the conventional error path (it surfaces as a
# compile error at the macro call site), so the panic-family lints stay off.
[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
