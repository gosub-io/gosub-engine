[package]
name = "gosub-css3-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
gosub_css3 = { path = ".." }
gosub_interface = { path = "../../gosub_interface" }
gosub_shared = { path = "../../gosub_shared" }

# Keep this crate out of the parent workspace
[workspace]
members = ["."]

[[bin]]
name = "css3_parser"
path = "fuzz_targets/css3_parser.rs"
test = false
doc = false
