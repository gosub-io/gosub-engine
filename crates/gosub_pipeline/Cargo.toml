[package]
name = "gosub_pipeline"
version = "0.1.0"
edition = "2021"

[[example]]
name = "pipeline_cairo"
path = "examples/pipeline_cairo.rs"
required-features = ["backend_cairo", "text_pango"]

[[example]]
name = "pipeline_skia"
path = "examples/pipeline_skia.rs"
required-features = ["backend_skia", "text_skia"]

[[example]]
name = "pipeline_vello"
path = "examples/pipeline_vello.rs"
required-features = ["backend_vello"]

[dependencies]
taffy = "0.7.5"
cow-utils = "0.1.3"
log = "0.4.25"
image = "0.25.5"
rand = "0.9.0"
sha2 = "0.10.8"
hex = "0.4.3"
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.138"
csscolorparser = "0.7.0"
regex = "1.11.1"
rstar = "0.12.2"
reqwest = { version = "0.12.15", features = ["blocking"] }
resvg = "0.45.0"
bytes = "1.10.1"
file_type = { version = "0.8.1", features = ["httpd"] }
anyhow = "1.0.95"
gosub_interface = { path = "../gosub_interface" }

parley = { version = "0.3.0", optional = true }
pangocairo = { version = "0.22", optional = true }
gtk4 = { version = "0.11", optional = true }
vello = { version = "0.4.1", optional = true }
winit = { version = "0.30.9", optional = true }
pollster = { version = "0.4.0", optional = true }
skia-safe = { version = "0.87.0", optional = true, features = ["textlayout", "gl", "gpu"] }
glutin = { version = "0.32.2", optional = true }
glutin-winit = { version = "0.5.0", optional = true }
raw-window-handle = { version = "0.6.2", optional = true }
gl-rs = { package = "gl", version = "0.14.0", optional = true }

[dev-dependencies]
gosub_html5  = { path = "../gosub_html5" }
gosub_css3   = { path = "../gosub_css3" }
gosub_stream = { path = "../gosub_stream" }

[features]
# Default: built-in simple text estimator (no external text library required)
default = ["text_simple"]

# Text measurement backends (pick exactly one)
text_simple = []
text_pango  = ["dep:pangocairo"]
text_parley = ["dep:parley"]
text_skia   = ["dep:skia-safe"]

# Optional render backends (only needed for standalone pipeline binaries)
backend_cairo = ["dep:gtk4"]
# Feature aliases so workspace-wide --features gtk4/skia/vello resolve cleanly
gtk4   = ["backend_cairo"]
backend_vello = ["dep:vello", "dep:winit", "dep:pollster"]
backend_skia  = ["dep:skia-safe", "dep:winit", "dep:pollster", "dep:glutin",
                  "dep:glutin-winit", "dep:raw-window-handle", "dep:gl-rs"]
