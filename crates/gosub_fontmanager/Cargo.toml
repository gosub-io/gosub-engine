[package]
name = "gosub_fontmanager"
version = "0.1.0"
edition = "2021"
authors = ["Gosub Community <info@gosub.io>"]
description = "Generic font manager"
license = "MIT"

[[bin]]
name = "display-fonts"
path = "src/bin/display-fonts.rs"

[[bin]]
name = "generate-svg"
path = "src/bin/generate-svg.rs"

[[bin]]
name = "gtk-test"
path = "src/bin/gtk-test.rs"
required-features = ["gtk"]

[[bin]]
name = "gtk2-test"
path = "src/bin/gtk2-test.rs"
required-features = ["gtk"]

[[bin]]
name = "vello-test"
path = "src/bin/vello-test.rs"

[dependencies]
gosub_interface = { version = "0.1.1", registry = "gosub", path = "../gosub_interface", features = [] }
parking_lot = "0.12"
colog = "1.4.0"
log = "0.4.29"
anyhow = "1.0.102"
prettytable = "0.10.0"
vello = "0.8.0"
winit = "0.30.12"
pollster = "0.4.0"
image = "0.25.10"
swash = "0.2.6"
lazy_static = "1.5.0"
rand = "0.10.0"
cow-utils = "0.1.3"

gtk4 = { version = "0.11.1", features = ["v4_6"], optional = true }
parley = "0.9.0"
font-kit = { version = "0.14.3" }
freetype-rs = "0.36.0"
# 19.4 is the latest version that works with the current version of font-kit (0.14.2)
cairo-rs = { version = "0.22.0", features = ["use_glib"], optional = true }
cairo-sys-rs = { version = "0.22.0", features = ["use_glib", "freetype"], optional = true }
pangocairo = { version = "0.22.0", optional = true }

[features]
gtk = ["dep:gtk4", "dep:cairo-rs", "dep:cairo-sys-rs", "dep:pangocairo"]
