[package]
name = "gosub_taffy"
version = "0.1.1"
edition = "2021"
authors = ["Gosub Community <info@gosub.io>"]
license = "MIT"
description = "Taffy layouter for Gosub"

[dependencies]
gosub_shared = { version = "0.1.1", registry = "gosub", path = "../gosub_shared" }
gosub_lattice = { version = "0.1.0", registry = "gosub", path = "../gosub_lattice" }
parking_lot = { workspace = true }
gosub_interface = { version = "0.1.1", registry = "gosub", path = "../gosub_interface" }
gosub_fontmanager = { version = "0.1.0", path = "../gosub_fontmanager", registry = "gosub" }
taffy = { workspace = true, features = ["std", "flexbox", "grid", "block_layout", "content_size", "calc"] }
anyhow = { workspace = true }
regex = { workspace = true }
log = { workspace = true }
parley = { workspace = true, features = ["std"] }
