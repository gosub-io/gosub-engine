[package]
name = "gosub_taffy"
version = "0.1.1"
edition = "2021"
authors = ["Gosub Community <info@gosub.io>"]
license = "MIT"
description = "Taffy layouter for Gosub"

[dependencies]
gosub_shared = { version = "0.1.1", registry = "gosub", path = "../gosub_shared" }
gosub_interface = { version = "0.1.1", registry = "gosub", path = "../gosub_interface" }
gosub_fontmanager = { version = "0.1.0", path = "../gosub_fontmanager", registry = "gosub" }
taffy = { version = "0.9.2", default-features = false, features = ["std", "flexbox", "grid", "block_layout", "content_size"] }
anyhow = "1.0.102"
regex = "1.12.3"
log = "0.4.29"
parley = { version = "0.7.0", default-features = false, features = ["std"] }
