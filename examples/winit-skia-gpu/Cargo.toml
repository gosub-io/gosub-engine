[package]
name = "example-winit-skia-gpu"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "winit-skia-gpu"
path = "main.rs"

[dependencies]
gosub_engine = { path = "../../crates/gosub_engine", features = ["winit", "backend_skia"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline", features = ["backend_skia_gl"] }
winit = "0.30.12"
softbuffer = "0.4"
skia-safe = { version = "0.87.0", features = ["gl"] }
glutin = "0.32"
glutin-winit = "0.5"
raw-window-handle = "0.6"
once_cell = "1.21"
parking_lot = "0.12"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
url = "2.5"
uuid = { version = "1", features = ["v4", "macro-diagnostics"] }
anyhow = "1.0"
log = "0.4"
simple_logger = "5.0"

[target.'cfg(not(target_os = "macos"))'.dependencies]
skia-safe = { version = "0.87.0", features = ["egl"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline", features = ["backend_skia_egl"] }

[target.'cfg(target_os = "macos")'.dependencies]
skia-safe = { version = "0.87.0", features = ["metal"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline", features = ["backend_skia_metal"] }
