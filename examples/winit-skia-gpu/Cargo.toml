[package]
name = "example-winit-skia-gpu"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "winit-skia-gpu"
path = "main.rs"

[dependencies]
gosub_engine = { path = "../../crates/gosub_engine", features = ["winit", "backend_skia"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline", features = ["backend_skia_gl"] }
winit = { workspace = true }
softbuffer = { workspace = true }
skia-safe = { workspace = true, features = ["gl"] }
glutin = "0.32"
glutin-winit = "0.5"
raw-window-handle = "0.6"
once_cell = { workspace = true }
parking_lot = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
url = { workspace = true }
uuid = { workspace = true, features = ["v4", "macro-diagnostics"] }
anyhow = { workspace = true }
log = { workspace = true }
simple_logger = { workspace = true }

[target.'cfg(not(target_os = "macos"))'.dependencies]
skia-safe = { workspace = true, features = ["egl"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline", features = ["backend_skia_egl"] }

[target.'cfg(target_os = "macos")'.dependencies]
skia-safe = { workspace = true, features = ["metal"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline", features = ["backend_skia_metal"] }
