[package]
name = "example-egui-cairo"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "egui-cairo"
path = "main.rs"

[dependencies]
gosub_engine = { path = "../../crates/gosub_engine", features = ["ui_eframe", "backend_cairo_pango", "sqlite_cookie_store"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline", features = ["backend_cairo"] }
eframe = { version = "0.34", features = ["wgpu"] }
egui = "0.34"
once_cell = "1.21"
parking_lot = "0.12"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
url = "2.5"
uuid = { version = "1", features = ["v4", "macro-diagnostics"] }
anyhow = "1.0"
log = "0.4"
simple_logger = "5.0"
