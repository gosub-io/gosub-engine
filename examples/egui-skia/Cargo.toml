[package]
name = "example-egui-skia"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "egui-skia"
path = "main.rs"

[dependencies]
gosub_engine = { path = "../../crates/gosub_engine", features = ["ui_eframe", "backend_skia", "sqlite_cookie_store"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline", features = ["backend_skia"] }
eframe = { workspace = true, features = ["wgpu"] }
egui = { workspace = true }
once_cell = { workspace = true }
parking_lot = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
url = { workspace = true }
uuid = { workspace = true, features = ["v4", "macro-diagnostics"] }
anyhow = { workspace = true }
log = { workspace = true }
simple_logger = { workspace = true }
