[package]
name = "example-winit-vello"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "winit-vello"
path = "main.rs"

[dependencies]
gosub_engine = { path = "../../crates/gosub_engine", features = ["winit"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline" }
gosub_renderer_vello = { path = "../../crates/gosub_renderer_vello" }
winit = { workspace = true }
vello = { workspace = true }
once_cell = { workspace = true }
parking_lot = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time"] }
url = { workspace = true }
uuid = { workspace = true, features = ["v4", "macro-diagnostics"] }
anyhow = { workspace = true }
log = { workspace = true }
simple_logger = { workspace = true }
