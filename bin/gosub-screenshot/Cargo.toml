[package]
name = "gosub-screenshot"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "gosub-screenshot"
path = "main.rs"

[dependencies]
gosub_engine = { path = "../../crates/gosub_engine", features = ["backend_cairo_pango"] }
gosub_render_pipeline = { path = "../../crates/gosub_render_pipeline", features = ["backend_cairo"] }
cairo-rs = "0.22"
image = "0.25"
once_cell = "1.21"
parking_lot = "0.12"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
url = "2.5"
uuid = { version = "1", features = ["v4", "macro-diagnostics"] }
anyhow = "1.0"
clap = { version = "4.0", features = ["derive"] }
log = "0.4"
simple_logger = "5.0"
