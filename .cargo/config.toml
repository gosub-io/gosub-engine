[registries]
gosub = { index = "sparse+https://registry.gosub.io/" }

# Faster linking for the large binaries (gosub-screenshot, the example browsers).
# The linker is a small wrapper (.cargo/linker.sh) that uses mold when it (and
# clang) are installed — several times faster on the big link steps — and falls
# back to the system default linker otherwise, so this works for everyone with no
# per-developer setup. To benefit, just install mold:
#   apt install mold      (or dnf/pacman install mold)   then verify: mold --version
[target.x86_64-unknown-linux-gnu]
linker = ".cargo/linker.sh"
