name: Gosub Continuous Integration (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        rust_version: [ stable, nightly, 1.73.0 ]
#        rust_version: [ stable, beta, nightly, 1.73.0, "stable minus 1 release", "stable minus 2 releases" ]
#        os: [ ubuntu-24.04, windows-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}
      - name: Install dependencies
        run: sudo apt update -y && sudo apt install sqlite3 libsqlite3-dev libglib2.0-dev libcairo2-dev libgdk-pixbuf-2.0-dev libpango1.0-dev libgtk-4-dev -y
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-24.04-cargo-registry-${{ matrix.rust_version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-24.04-cargo-registry-${{ matrix.rust_version }}-
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/target
          key: ubuntu-24.04-cargo-target-${{ matrix.rust_version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-24.04-cargo-target-${{ matrix.rust_version }}-
      - name: Build and test
        run: cargo test --verbose --all --no-fail-fast --all-features --all-targets

  clippy:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        rust_version: [ stable, nightly ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}
          components: clippy
      - name: Install dependencies
        run: sudo apt update -y && sudo apt install sqlite3 libsqlite3-dev libglib2.0-dev libcairo2-dev libgdk-pixbuf-2.0-dev libpango1.0-dev libgtk-4-dev -y
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-24.04-cargo-registry-${{ matrix.rust_version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-24.04-cargo-registry-${{ matrix.rust_version }}-
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/target
          key: ubuntu-24.04-cargo-target-${{ matrix.rust_version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-24.04-cargo-target-${{ matrix.rust_version }}-
      - name: Run Clippy
        run: cargo clippy --all --all-targets --all-features -- -D warnings

  fmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run fmt
        run: cargo fmt --check --all
